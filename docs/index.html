      <h1>Installation</h1>
      <h2 id="requirements">Requirements</h2>
      <p>InoxCMS requires the following software installed on your system:</p>
      <ul>
        <li><strong>PHP</strong> 8.3 or higher (with extensions: BCMath, Ctype, Fileinfo, JSON, Mbstring, OpenSSL, PDO, Tokenizer, XML)</li>
        <li><strong>Composer</strong> 2.x (optional — all dependencies are included in the repository)</li>
        <li><strong>Database</strong> — SQLite (default, no setup required) or MySQL 8.0+ / MariaDB 10.3+</li>

      <h2 id="installation-steps">Installation Steps</h2>
      <h3>1. Clone the Repository</h3>
      <pre><code>git clone https://github.com/maicolrme/inoxcms.git
cd inoxcms</code></pre>
      <h3>2. Run the Installer</h3>
      <p>The installer automatically creates your <code>.env</code> file, generates the app key, creates the storage link, and guides you through everything:</p>
      <pre><code>php artisan inox:install</code></pre>
      <p>Or use the quick mode with defaults (SQLite, website type, no extra features):</p>
      <pre><code>php artisan inox:install --quick</code></pre>
      <p>The installer will:</p>
      <ul>
        <li>Ask for project type (website, e-commerce, or API)</li>
        <li>Configure database connection (SQLite or MySQL)</li>
        <li>Run migrations</li>

  configuration: {
    title: 'Configuration',
    content: `
      <h1>Configuration</h1>
      <p>InoxCMS uses a two-layer configuration system: environment variables (<code>.env</code>) for server-specific settings, and database settings for application-level configuration.</p>
      <h2 id="environment">Environment File</h2>
      <p>The <code>.env</code> file at the project root stores environment-specific configuration. Key variables:</p>
      <table>
        <thead><tr><th>Variable</th><th>Default</th><th>Description</th></tr></thead>
        <tbody>
          <tr><td><code>APP_NAME</code></td><td>MyBlog</td><td>Application name displayed in admin</td></tr>
          <tr><td><code>APP_URL</code></td><td>http://127.0.0.1:8000</td><td>Base URL for links and assets</td></tr>
          <tr><td><code>APP_DEBUG</code></td><td>true</td><td>Enable detailed error pages</td></tr>
          <tr><td><code>DB_CONNECTION</code></td><td>sqlite</td><td>Database driver (sqlite or mysql)</td></tr>
          <tr><td><code>INOX_PROJECT_TYPE</code></td><td>website</td><td>Project type: website, ecommerce, api</td></tr>
          <tr><td><code>INOX_FEATURE_REALTIME</code></td><td>false</td><td>Enable WebSocket support</td></tr>
          <tr><td><code>INOX_FEATURE_AI</code></td><td>false</td><td>Enable AI features</td></tr>
          <tr><td><code>STORAGE_DISK</code></td><td>local</td><td>Media storage driver (local, s3, r2)</td></tr>
        </tbody>
      </table>
      <h2 id="inox-config">InoxCMS Configuration</h2>
      <p>The <code>core/config/inox.php</code> file contains InoxCMS-specific settings, including module paths, marketplace URLs, cache configuration, and feature flags. Most values can be overridden via <code>.env</code>.</p>
      <pre><code>return [
    'name' => env('INOX_NAME', 'INOX'),
    'version' => '0.1.0',
    'modules' => [
        'path' => dirname(__DIR__, 2) . '/modules',
        'active' => ['storage', 'api', 'schema-studio'],
    ],
    'themes' => [
        'path' => dirname(__DIR__, 2) . '/themes',
        'active' => 'inox/simple',
    ],
    'marketplace' => [
        'modules_url' => 'https://raw.githubusercontent.com/maicolrme/inoxcms-modules/main/registry.json',
        'themes_url'  => 'https://raw.githubusercontent.com/maicolrme/inoxcms-themes/main/registry.json',
    ],
];</code></pre>
      <h2 id="database-settings">Database Settings</h2>
      <p>Application settings — site name, description, theme options, cache preferences — are stored in the <code>inox_settings</code> table. The <code>SettingRegistry</code> manages these settings and provides autoloading into the config cache.</p>
      <pre><code>// Get a setting value
$value = setting('site_name', 'My Site');

// Set a value programmatically
app('setting.registry')->set('site_name', 'New Name', 'core');</code></pre>
      <h2 id="helper">The <code>cms_path()</code> Helper</h2>
      <p>InoxCMS abstracts Laravel internals into the <code>core/</code> directory. The <code>cms_path()</code> helper returns the absolute path to the project root — useful for referencing modules, themes, and the <code>.env</code> file from within the core.</p>
      <pre><code>// Get the project root path
$root = cms_path();           // /home/user/projects/inoxcms

// Get a specific path
$env  = cms_path('.env');     // /home/user/projects/inoxcms/.env
$mods = cms_path('modules');  // /home/user/projects/inoxcms/modules</code></pre>
    `

      <h1>Directory Structure</h1>

      <pre><code>inoxcms/
├── core/                  # Laravel framework & application internals

├── vendor/                # (empty — autoloading goes through core/)
├── schema/                # Visual schema output files
├── index.php              # Web entry point
├── artisan                # CLI entry point
├── .env                   # Environment configuration (root)
├── composer.json          # Root composer manifest
├── .gitmodules            # Submodule configuration
└── docs/                  # Documentation (this site)</code></pre>
      <h2 id="core-structure">The <code>core/</code> Directory</h2>
      <p>The <code>core/</code> directory contains all Laravel internals, abstracted from the project root. It includes:</p>
      <ul>
        <li><strong>app/Core/</strong> — InoxCMS engine classes (ModuleEngine, ThemeEngine, SettingRegistry, TemplateRegistry, HookSystem, Installer)</li>
        <li><strong>app/Livewire/</strong> — Livewire admin components (Posts, Pages, Categories, Tags, Settings, Modules, Themes, Roles)</li>
        <li><strong>app/Models/</strong> — Eloquent models (Post, Category, Tag, Setting, User, Role, Permission)</li>
        <li><strong>app/Providers/</strong> — Service providers that bootstrap modules, themes, settings, and permissions</li>
        <li><strong>app/Http/Controllers/</strong> — Web and API controllers (Blog, Page, Admin, Installer, Login)</li>

      </ul>

require __DIR__ . '/core/vendor/autoload.php';
$app = require_once __DIR__ . '/core/bootstrap/app.php';
$app->handleRequest(Request::capture());</code></pre>
      <h2 id="module-theme-structure">Module & Theme Structure</h2>
      <p>Modules and themes follow a vendor/name convention:</p>
      <pre><code>modules/inox/seo/
├── module.json            # Manifest (name, version, provider class, permissions)
├── config/
├── database/migrations/
├── resources/views/
├── routes/
└── src/
    ├── Providers/ModuleServiceProvider.php
    ├── Livewire/
    ├── Models/
    └── Http/

themes/inox/simple/
├── theme.json             # Manifest (settings schema, template list)
├── templates/             # Blade templates (layout, home, page, post, etc.)
└── assets/                # CSS, JS, images</code></pre>

  modules: {
    title: 'Module Engine',
    content: `
      <h1>Module Engine</h1>
      <p>The Module Engine is the heart of InoxCMS's extensibility. It discovers, activates, and manages modules — self-contained packages that extend CMS functionality.</p>
      <h2 id="how-it-works">How It Works</h2>
      <p>Modules are stored in <code>modules/{vendor}/{name}/</code>. Each module has a <code>module.json</code> manifest and a ServiceProvider that bootstraps its functionality. The <code>ModuleEngine</code> class scans the module directory, reads manifests, and activates modules defined in the configuration.</p>
      <pre><code>// Activate a module programmatically
$engine = app('module.engine');
$engine->activate('seo');</code></pre>
      <h2 id="module-manifest">Module Manifest</h2>
      <p>Every module must have a <code>module.json</code> file:</p>
      <pre><code>{
    "name": "seo",
    "vendor": "inox",
    "version": "1.0.0",
    "description": "SEO tools — meta tags, sitemaps, Open Graph, analytics",
    "requires": {
        "inox": ">=0.1.0",
        "php": ">=8.3"
    },
    "permissions": {
        "database": ["read:posts", "write:post_meta"],
        "events": ["content.saved", "content.deleted"],
        "routes": ["/sitemap.xml", "/robots.txt"],
        "hooks": ["head.meta", "admin.sidebar", "content.saving"]
    },
    "provider": "Inox\\\\Seo\\\\Providers\\\\ModuleServiceProvider"
}</code></pre>
      <h2 id="module-service-provider">Module Service Provider</h2>
      <p>The ServiceProvider bootstraps the module — merging config, loading views, registering Livewire components, and hooking into the CMS:</p>
      <pre><code>class ModuleServiceProvider extends ServiceProvider
{
    public function register(): void
    {
        \$this->mergeConfigFrom(__DIR__.'/../../config/seo.php', 'seo');
    }

    public function boot(): void
    {
        \$this->loadMigrationsFrom(__DIR__.'/../../database/migrations');
        \$this->loadViewsFrom(__DIR__.'/../../resources/views', 'seo');
        \$this->loadRoutesFrom(__DIR__.'/../../routes/web.php');

        // Register Livewire components
        Livewire::component('seo-settings', SeoSettings::class);

        // Register hooks
        Hook::filter('head.meta', [\$this, 'injectMeta']);
        Hook::action('content.saved', [\$this, 'onContentSaved']);

        // Register admin nav items
        app('module.engine')->registerNav('seo', [
            ['label' => 'SEO', 'route' => 'admin.seo.settings',
             'active' => 'admin.seo.*'],
        ]);
    }
}</code></pre>
      <h2 id="available-modules">Available Modules</h2>
      <h3>SEO Module (<code>inox/seo</code>)</h3>
      <p>Adds meta tags management, sitemap generation (<code>/sitemap.xml</code>), robots.txt (<code>/robots.txt</code>), Open Graph tags, and analytics integration. Registers hooks on <code>head.meta</code> and <code>content.saved</code>.</p>
      <h3>API Module (<code>inox/api</code>)</h3>
      <p>RESTful API layer with Sanctum token authentication, visual route manager, API logging, and automatic documentation generation. See the <a href="#/api">API Module</a> page for details.</p>
      <h3>Storage Module (<code>inox/storage</code>)</h3>
      <p>Media library with upload, image preview, and multiple disk drivers (local, S3, R2). Provides a media manager UI and a RESTful API for file operations. See <a href="#/storage">Storage</a> for details.</p>
      <h3>Schema Studio (<code>inox/schema-studio</code>)</h3>
      <p>Visual schema builder — design data models, generate migrations, Eloquent models, policies, and CRUD APIs. See <a href="#/schema-studio">Schema Studio</a> for details.</p>
      <h2 id="creating-a-module">Creating a Module</h2>
      <p>Modules follow a standard structure. Create your module directory and files:</p>
      <pre><code>modules/your-vendor/your-module/
├── module.json
├── config/
├── database/migrations/
├── resources/views/
├── routes/
└── src/
    ├── Providers/
    │   └── ModuleServiceProvider.php
    ├── Livewire/
    ├── Models/
    └── Http/</code></pre>
      <p>Use the hook system to integrate with the CMS, register Livewire components for the admin panel, and register nav items so users can access your module's UI.</p>
      <h2 id="marketplace">Marketplace</h2>
      <p>The Module Engine includes marketplace integration:</p>
      <ul>
        <li>Fetches registry from <code>raw.githubusercontent.com</code></li>
        <li>Checks for updates against installed versions</li>
        <li>Installs modules from URL or ZIP file</li>
        <li>All operations available through the admin UI</li>
      </ul>
      <pre><code>// Fetch marketplace registry
\$registry = \$engine->fetchRegistry();

// Check for updates
\$updates = \$engine->checkUpdates(\$registry);

// Install from URL
\$engine->installFromUrl('https://github.com/...');</code></pre>
    `
  },

      <h1>API Module</h1>
      <p>The API module provides a RESTful API layer with token-based authentication, visual route management, request logging, and dynamic CRUD for generated models.</p>
      <h2 id="installation-configuration">Installation & Configuration</h2>
      <p>The API module is activated by default. Configure it via the <code>.env</code> file:</p>
      <pre><code>API_AUTH_TYPE=sanctum   # Authentication method (sanctum|none)
API_RATE_LIMIT=60       # Requests per minute
API_LOG_ENABLED=true    # Enable request/response logging</code></pre>
      <h2 id="authentication">Authentication</h2>
      <p>The API uses Laravel Sanctum for token-based authentication. Generate tokens from the admin panel (<code>/admin/api/tokens</code>) or programmatically:</p>
      <pre><code>use App\Models\User;

// Create a token
\$user = User::find(1);
\$token = \$user->createToken('api-token')->plainTextToken;

// Use in requests
// Authorization: Bearer {token}</code></pre>
      <h2 id="route-manager">Route Manager</h2>
      <p>The visual Route Manager (<code>/admin/api/routes</code>) lets you enable or disable individual API routes. Each route can be toggled per HTTP method (GET, POST, PUT, DELETE). Disabled routes return 404.</p>
      <pre><code>// Route toggle keys are stored as settings:
// api.route.GET.api.dynamic.Profile  → "1" (enabled)
// api.route.DELETE.api.dynamic.Profile → "0" (disabled)

// The RouteManager middleware checks these toggles at runtime</code></pre>
      <h2 id="api-endpoints">API Endpoints</h2>
      <p>The API module provides the following endpoints:</p>
      <table>
        <thead><tr><th>Method</th><th>Endpoint</th><th>Description</th></tr></thead>
        <tbody>
          <tr><td>GET</td><td><code>/api/tokens</code></td><td>List your API tokens</td></tr>
          <tr><td>POST</td><td><code>/api/tokens</code></td><td>Create a new token</td></tr>
          <tr><td>DELETE</td><td><code>/api/tokens/{id}</code></td><td>Revoke a token</td></tr>
          <tr><td>GET</td><td><code>/api/dynamic/{model}</code></td><td>List records of a dynamic model</td></tr>
          <tr><td>POST</td><td><code>/api/dynamic/{model}</code></td><td>Create a record</td></tr>
          <tr><td>GET</td><td><code>/api/dynamic/{model}/{id}</code></td><td>Get a record</td></tr>
          <tr><td>PUT</td><td><code>/api/dynamic/{model}/{id}</code></td><td>Update a record</td></tr>
          <tr><td>DELETE</td><td><code>/api/dynamic/{model}/{id}</code></td><td>Delete a record</td></tr>
        </tbody>

  'schema-studio': {
    title: 'Schema Studio',
    content: `
      <h1>Schema Studio</h1>
      <p>Schema Studio is a visual schema builder that lets you design data models through an intuitive admin interface. It generates migrations, Eloquent models, policies, and RESTful CRUD APIs automatically.</p>
      <h2 id="how-it-works">How It Works</h2>
      <p>Schemas are stored as JSON files in the <code>schema/</code> directory at the project root. The Schema Designer UI (<code>/admin/schema-studio/designer/{name}</code>) lets you define fields, types, validation rules, and relationships visually. When you save a schema, the system generates all the necessary PHP files.</p>
      <h2 id="field-types">Field Types</h2>
      <p>Schema Studio supports a variety of field types:</p>
      <table>
        <thead><tr><th>Type</th><th>Database Column</th><th>Description</th></tr></thead>
        <tbody>
          <tr><td>string</td><td>VARCHAR</td><td>Single-line text</td></tr>
          <tr><td>text</td><td>TEXT</td><td>Multi-line text</td></tr>
          <tr><td>number</td><td>INTEGER</td><td>Numeric value</td></tr>
          <tr><td>boolean</td><td>BOOLEAN</td><td>True/false toggle</td></tr>
          <tr><td>email</td><td>VARCHAR</td><td>Email address with validation</td></tr>
          <tr><td>url</td><td>VARCHAR</td><td>URL with validation</td></tr>
          <tr><td>date</td><td>DATE</td><td>Date picker</td></tr>
          <tr><td>datetime</td><td>DATETIME</td><td>Date and time</td></tr>
          <tr><td>image</td><td>VARCHAR (path)</td><td>Image upload</td></tr>
          <tr><td>relationship</td><td>FOREIGN KEY</td><td>BelongsTo relationship</td></tr>
        </tbody>
      </table>
      <h2 id="generated-files">Generated Files</h2>
      <p>When you save a schema, Schema Studio generates:</p>
      <ul>
        <li><strong>Migration</strong> — <code>database/migrations/xxxx_xx_xx_create_{table}_table.php</code></li>
        <li><strong>Model</strong> — <code>app/Models/{ModelName}.php</code></li>
        <li><strong>Policy</strong> — <code>app/Policies/{ModelName}Policy.php</code></li>
        <li><strong>OpenAPI Spec</strong> — <code>schema/{model}_openapi.json</code></li>
        <li><strong>TypeScript Types</strong> — <code>schema/{model}.ts</code></li>
      </ul>
      <h2 id="dynamic-crud">Dynamic CRUD API</h2>
      <p>Once a schema is created, the dynamic model controller exposes full CRUD endpoints:</p>
      <pre><code>GET    /api/dynamic/{model}     # List records (paginated)
POST   /api/dynamic/{model}     # Create a record
GET    /api/dynamic/{model}/{id} # Get a record
PUT    /api/dynamic/{model}/{id} # Update a record
DELETE /api/dynamic/{model}/{id} # Delete a record</code></pre>
      <p>These routes can be toggled on/off individually from the API Route Manager in the admin panel.</p>
      <h2 id="schema-example">Schema Example</h2>
      <pre><code>{
    "model": "Project",
    "table": "projects",
    "fields": [
        {
            "name": "title",
            "type": "string",
            "label": "Project Title",

            "name": "url",

            "validation": "boolean",

        }

}</code></pre>
    `
  },
  permissions: {
    title: 'Roles & Permissions',
    content: `
      <h1>Roles & Permissions</h1>
      <p>InoxCMS includes a role-based access control (RBAC) system with fine-grained permission management.</p>
      <h2 id="how-it-works">How It Works</h2>
      <p>Permissions are registered by the system and by modules. Roles group permissions together, and users can be assigned one or more roles. A super-admin role bypasses all permission checks.</p>
      <pre><code>// Check if a user has permission
\$user->hasPermission('manage_posts');

// Check if a user has a role
\$user->hasRole('admin');</code></pre>
      <h2 id="permission-model">Permission Model</h2>
      <p>The <code>Permission</code> model stores individual permissions with:</p>
      <ul>
        <li><strong>name</strong> — Display name (e.g., "Manage Posts")</li>
        <li><strong>slug</strong> — Permission identifier (e.g., "manage_posts")</li>
        <li><strong>description</strong> — What this permission allows</li>
        <li><strong>group</strong> — Grouping for the admin UI (e.g., "Content")</li>
      </ul>
      <h2 id="permission-middleware">Permission Middleware</h2>
      <p>The <code>can</code> middleware alias checks route access:</p>
      <pre><code>// In routes:
Route::middleware('can:manage_posts')->group(function () {
    // ...
});</code></pre>
      <p>The middleware checks if the authenticated user has at least one of the required permissions. If not authenticated, it redirects to login. If authenticated but lacking permissions, it returns a 403 response.</p>
      <h2 id="dynamic-gates">Dynamic Gates</h2>
      <p><code>AppServiceProvider</code> registers Laravel authorization gates dynamically from the <code>permissions</code> table. This means you can use Laravel's <code>@can</code> Blade directive and <code>Gate::allows()</code> with any permission slug:</p>
      <pre><code>@@can('manage_posts')
    &lt;a href="/admin/posts"&gt;Manage Posts&lt;/a&gt;
@@endcan</code></pre>
      <h2 id="admin-interface">Admin Interface</h2>
      <p>Manage roles and permissions from the admin panel:</p>
      <ul>
        <li><strong>Roles</strong> (<code>/admin/roles</code>) — Create, edit, and delete roles. Assign permissions to each role.</li>
        <li><strong>Users</strong> (<code>/admin/users</code>) — Assign roles to users.</li>
      </ul>
    `
  },
  hooks: {
    title: 'Hook System',
    content: `
      <h1>Hook System</h1>
      <p>The Hook System provides a WordPress-style filter and action API for extending CMS functionality without modifying core code.</p>
      <h2 id="filters-vs-actions">Filters vs Actions</h2>
      <ul>
        <li><strong>Filters</strong> — Modify data and return it. Hooks that transform content, meta tags, or configuration.</li>
        <li><strong>Actions</strong> — Perform side effects. Hooks that fire during events like saving content or rendering the admin sidebar.</li>
      </ul>
      <h2 id="registering-hooks">Registering Hooks</h2>
      <p>Register filters and actions from any ServiceProvider:</p>
      <pre><code>use App\\Core\\HookSystem\\Hook;

// Register a filter (modifies data)
Hook::filter('head.meta', function (\$tags) {
    \$tags[] = '&lt;meta name="author" content="InoxCMS"&gt;';
    return \$tags;
}, 10);

// Register an action (side effect)
Hook::action('content.saved', function (\$post) {
    // Notify subscribers, clear cache, etc.
    Log::info('Content saved: ' . \$post->id);
}, 10);

// Filters and actions support priority (lower = runs first)</code></pre>
      <h2 id="applying-hooks">Applying Hooks</h2>
      <p>Apply filters and execute actions from anywhere in the application:</p>
      <pre><code>// Apply filters to a value
\$metaTags = Hook::apply('head.meta', [
    '&lt;meta name="description" content="...">',
]);

// Execute an action
Hook::execute('module.activated', \$moduleName);</code></pre>
      <h2 id="removing-hooks">Removing Hooks</h2>
      <pre><code>Hook::removeFilter('head.meta', \$callback, 10);
Hook::removeAction('content.saved', \$callback, 10);</code></pre>
      <h2 id="core-hooks">Core Hooks</h2>
      <p>InoxCMS fires these hooks throughout the system:</p>
      <table>
        <thead><tr><th>Hook</th><th>Type</th><th>Description</th></tr></thead>
        <tbody>
          <tr><td><code>head.meta</code></td><td>Filter</td><td>Modify HTML &lt;head&gt; meta tags</td></tr>
          <tr><td><code>content.saving</code></td><td>Filter</td><td>Modify content before save</td></tr>
          <tr><td><code>content.saved</code></td><td>Action</td><td>After content is saved</td></tr>
          <tr><td><code>content.deleted</code></td><td>Action</td><td>After content is deleted</td></tr>
          <tr><td><code>admin.sidebar</code></td><td>Filter</td><td>Modify admin sidebar menu items</td></tr>
          <tr><td><code>module.activated</code></td><td>Action</td><td>When a module is activated</td></tr>
          <tr><td><code>module.deactivated</code></td><td>Action</td><td>When a module is deactivated</td></tr>
        </tbody>
      </table>
    `

    content: `
      <h1>CLI Commands</h1>
      <p>InoxCMS extends Laravel's Artisan CLI with custom commands for CMS-specific operations.</p>
      <h2 id="available-commands">Available Commands</h2>
      <h3><code>inox:install</code></h3>
      <p>Interactive installation wizard that guides you through project setup:</p>
      <pre><code>php artisan inox:install
php artisan inox:install --quick   # Skip prompts, use defaults</code></pre>

php artisan inox:make-theme mytheme --description="My awesome theme"</code></pre>

php artisan route:list

  architecture: {
    title: 'Architecture',
    content: `
      <h1>Architecture Overview</h1>
      <p>Understanding InoxCMS's architecture helps you extend and customize the system effectively.</p>
      <h2 id="core-abstraction">Core Abstraction</h2>
      <p>InoxCMS hides Laravel's framework files inside <code>core/</code>. The project root contains only CMS-specific files:</p>
      <ul>
        <li><code>index.php</code> and <code>artisan</code> bootstrap Laravel from <code>core/</code></li>
        <li><code>.env</code> is loaded from the project root via <code>$app->useEnvironmentPath()</code></li>
        <li><code>cms_path()</code> helper returns the absolute path to the root for referencing modules, themes, and config</li>
        <li>Composer autoloading goes through <code>core/vendor/</code></li>
      </ul>
      <h2 id="service-providers">Service Providers</h2>
      <p>InoxCMS uses four core service providers, each with a specific responsibility:</p>
      <h3>InoxServiceProvider</h3>
      <ul>
        <li>Registers <code>ModuleEngine</code> and <code>ThemeEngine</code> as singletons</li>
        <li>Loads the <code>helpers.php</code> file (provides <code>theme()</code>, <code>setting()</code>, <code>cms_path()</code>)</li>
        <li>Registers InoxCMS Artisan commands</li>
        <li>Discovers and activates modules on boot</li>
        <li>Registers core nav items and boots the active theme</li>
      </ul>
      <h3>AppServiceProvider</h3>
      <ul>
        <li>Registers authorization gates dynamically from the permissions table</li>
        <li>Registers Livewire components for posts, pages, categories, and tags</li>
        <li>Registers content-related nav items</li>
      </ul>
      <h3>SettingServiceProvider</h3>
      <ul>
        <li>Registers <code>SettingRegistry</code> as a singleton</li>
        <li>Registers core setting schemas (site info, content, cache, features)</li>
        <li>Autoloads settings into the Laravel config cache</li>
      </ul>
      <h2 id="data-flow">Request Lifecycle</h2>
      <ol>
        <li><code>index.php</code> loads Composer autoloader from <code>core/vendor/</code></li>
        <li><code>core/bootstrap/app.php</code> creates the Laravel Application with <code>basePath: dirname(__DIR__)</code> (which resolves to <code>core/</code>)</li>
        <li>Environment path is set to the project root (<code>dirname(__DIR__, 2)</code>)</li>
        <li>Middleware stack processes the request: <code>RedirectIfNotInstalled</code> checks if setup is complete</li>
        <li>Route matching dispatches to the appropriate controller or Livewire component</li>
        <li>If no route matches, the catch-all <code>/{path}</code> route renders a page via <code>PageController</code></li>
      </ol>
      <h2 id="settings-system">Settings System</h2>
      <p>All application settings are stored in the database (<code>inox_settings</code> table), not in <code>.env</code>. The <code>SettingRegistry</code> provides:</p>
      <ul>
        <li>Schema registration — modules and themes declare their settings structure</li>
        <li>Autoloading — frequently accessed settings are cached in the Laravel config</li>
        <li>Purge — when a module/theme is uninstalled, its settings are cleaned up</li>
        <li>Helper functions — <code>setting()</code> for global values, <code>theme()</code> for theme-specific values</li>
      </ul>
      <h2 id="livewire-components">Livewire Components</h2>
      <p>The admin panel is built entirely with Laravel Livewire 4 components, providing a reactive SPA-like experience without writing JavaScript:</p>
      <ul>
        <li>Post/Page forms with real-time validation</li>
        <li>Category and tag management</li>
        <li>Module and theme management with marketplace integration</li>
        <li>Settings panels with save buttons</li>
        <li>Media library with upload progress</li>
      </ul>
    `
  }
};

const { createApp, ref, computed, watch, onMounted, nextTick, onUnmounted } = Vue;
const { createRouter, createWebHashHistory } = VueRouter;

const sidebarGroups = ref([
  {
    label: 'Getting Started',
    collapsed: false,
    pages: [
      { path: '/',               label: 'Overview' },
      { path: '/installation',    label: 'Installation' },
      { path: '/configuration',   label: 'Configuration' },
      { path: '/directory-structure', label: 'Directory Structure' },
    ]
  },
  {
    label: 'Core Features',
    collapsed: false,
    pages: [
      { path: '/modules',          label: 'Module Engine' },
      { path: '/themes',           label: 'Theme Engine' },
      { path: '/permissions',      label: 'Roles & Permissions' },
      { path: '/hooks',            label: 'Hook System' },
      { path: '/cli',              label: 'CLI Commands' },
      { path: '/architecture',     label: 'Architecture' },
    ]
  },
  {
    label: 'Modules',
    collapsed: false,
    pages: [
      { path: '/api',              label: 'API Module' },
      { path: '/storage',          label: 'Storage & Media' },
      { path: '/schema-studio',    label: 'Schema Studio' },
    ]
  }
]);

function buildSearchIndex() {
  const results = [];
  for (const [key, page] of Object.entries(PAGES)) {
    const text = page.content.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
    const sections = [];
    const h2Regex = /<h2[^>]*id="([^"]*)"[^>]*>(.*?)<\/h2>/g;
    let m;
    while ((m = h2Regex.exec(page.content)) !== null) {
      sections.push({ id: m[1], text: m[2].replace(/<[^>]*>/g, '') });
    }
    results.push({ key, title: page.title, text, sections, content: text });
  }
  return results;
}

function addCopyButtons() {
  document.querySelectorAll('.docs-content pre').forEach(pre => {
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
      const code = pre.querySelector('code');
      const text = code ? code.textContent : pre.textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      });
    });
    pre.appendChild(btn);
  });
}

const routes = [
  { path: '/', component: { template: '<div></div>' } },
  ...Object.keys(PAGES).filter(k => k !== 'home').map(key => ({
    path: '/' + key,
    component: { template: '<div></div>' }
  })),
  { path: '/:pathMatch(.*)*', redirect: '/' }
];

const router = createRouter({
  history: createWebHashHistory(),
  routes
});

const app = createApp({
  setup() {
    const route = VueRouter.useRoute();
    const router = VueRouter.useRouter();
    const currentPath = computed(() => route.path === '/' ? 'home' : route.path.slice(1));
    const currentPage = computed(() => PAGES[currentPath.value] || PAGES.home);
    const currentContent = computed(() => currentPage.value.content);
    const loading = ref(false);
    const sidebarOpen = ref(false);
    const isDark = ref(false);
    const searchQuery = ref('');
    const searchOpen = ref(false);
    const searchIndex = ref(buildSearchIndex());

    const searchResults = computed(() => {
      const q = searchQuery.value.trim().toLowerCase();
      if (!q) return [];
      const fuse = new Fuse(searchIndex.value, {
        keys: ['title', 'text', 'sections.text'],
        threshold: 0.4,
        includeScore: true
      });
      return fuse.search(q).slice(0, 10).map(r => ({
        ref: r.item.key,
        title: r.item.title,
        section: highlightText(r.item.text.slice(0, 120), q)
      }));
    });

    function goToSearch(r) {
      searchOpen.value = false;
      searchQuery.value = '';
      router.push('/' + r.ref);
    }

    function highlightText(text, query) {
      const idx = text.toLowerCase().indexOf(query);
      if (idx < 0) return text.slice(0, 120) + '...';
      const start = Math.max(0, idx - 30);
      const end = Math.min(text.length, idx + query.length + 50);
      const prefix = start > 0 ? '...' : '';
      const suffix = end < text.length ? '...' : '';
      return prefix + text.slice(start, end) + suffix;
    }

    const tocItems = computed(() => {
      const items = [];
      const content = currentContent.value;
      const regex = /<(h2|h3)[^>]*id="([^"]*)"[^>]*>(.*?)<\/\1>/g;
      let m;
      while ((m = regex.exec(content)) !== null) {
        items.push({
          level: parseInt(m[1][1]),
          id: m[2],
          text: m[3].replace(/<[^>]*>/g, '')
        });
      }
      return items;
    });

    const activeToc = ref('');

    function scrollTo(id) {
      const el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth' });
        activeToc.value = id;
      }
    }

    function updateActiveToc() {
      const items = tocItems.value;
      if (!items.length) { activeToc.value = ''; return; }
      for (let i = items.length - 1; i >= 0; i--) {
        const el = document.getElementById(items[i].id);
        if (el && el.getBoundingClientRect().top <= 120) {
          activeToc.value = items[i].id;
          return;
        }
      }
      activeToc.value = items[0]?.id || '';
    }

    function toggleDarkMode() {
      isDark.value = !isDark.value;
      document.documentElement.classList.toggle('dark', isDark.value);
      localStorage.setItem('inox-docs-dark', isDark.value ? 'true' : 'false');
    }

    onMounted(() => {
      const saved = localStorage.getItem('inox-docs-dark');
      if (saved === 'true' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        isDark.value = true;
        document.documentElement.classList.add('dark');
      }
    });

    watch(currentPath, () => {
      nextTick(() => {
        addCopyButtons();
        updateActiveToc();
      });
    });

    onMounted(() => {
      nextTick(() => { addCopyButtons(); updateActiveToc(); });
    });

    let tocObserver = null;
    onMounted(() => {
      tocObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            activeToc.value = entry.target.id;
          }
        }
      }, { rootMargin: '-120px 0px -70% 0px' });
      const observer = tocObserver;
      nextTick(() => {
        document.querySelectorAll('.docs-content h2[id], .docs-content h3[id]').forEach(el => observer.observe(el));
      });
    });

    watch(currentPath, () => {
      nextTick(() => {
        if (tocObserver) {
          document.querySelectorAll('.docs-content h2[id], .docs-content h3[id]').forEach(el => tocObserver.observe(el));
        }
      });
    });

    onUnmounted(() => {
      if (tocObserver) tocObserver.disconnect();
    });

    return {
      currentContent, loading, sidebarOpen, isDark,
      sidebarGroups, searchQuery, searchOpen, searchResults,
      tocItems, activeToc, scrollTo, toggleDarkMode, goToSearch,
      updateActiveToc
    };
  }
});

app.use(router);
app.mount('#app');
</script>
</body>
